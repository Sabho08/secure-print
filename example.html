<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Example Page</title>
  <link rel="stylesheet" href="example.css" />
</head>
<body>
  <header>
    <h1>Hello from <code>example.html</code></h1>
  </header>

  <main>
    <section>
      <h2>Section Title</h2>
      <p>This is a sample paragraph to demonstrate basic HTML structure.</p>
      <button id="actionBtn">Click Me</button>
    </section>
  </main>

  <footer>
    <small>© 2024 Your Name</small>
  </footer>

  <script>
    // Tiny inline script for interactivity
    document.getElementById('actionBtn').addEventListener('click', () => {
      alert('Button clicked!');
    });
  </script>
</body>
</html>
