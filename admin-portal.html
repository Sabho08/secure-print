<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePrint | Provider Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #409FFF;
            --primary-glow: rgba(64, 159, 255, 0.4);
            --bg: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #F8FAFC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(64, 159, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.1;
            border-radius: 50%;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #8B5CF6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: white;
            box-shadow: 0 10px 20px var(--primary-glow);
            margin-bottom: 16px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #94A3B8;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #CBD5E1;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            padding: 16px;
            background: white;
            color: black;
            border: none;
            border-radius: 99px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.02);
            background: #F1F5F9;
        }

        button:active {
            transform: scale(0.98);
        }

        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            display: none;
            text-align: center;
        }

        .success { background: rgba(34, 197, 94, 0.1); color: #4ADE80; border: 1px solid rgba(74, 222, 128, 0.2); }
        .error { background: rgba(239, 68, 68, 0.1); color: #F87171; border: 1px solid rgba(248, 113, 113, 0.2); }

    </style>
</head>
<body>
    <div class="blob" style="top: -100px; left: -100px;"></div>
    
    <div class="container">
        <div class="logo-wrap">
            <div class="logo">SP</div>
            <h1>Provider Admin</h1>
            <p class="subtitle">Assign Shop Terminal Credentials</p>
        </div>

        <form id="adminForm">
            <div class="form-group">
                <label>Auth Email</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group">
                <label>Auth Password</label>
                <input type="password" id="password" placeholder="Min 6 characters" required>
            </div>

            <div class="form-group">
                <label>Assigned Shop ID</label>
                <input type="text" id="shopId" placeholder="SHOP-ALPHA-01" required>
            </div>

            <button type="submit" id="btnText">Provision Terminal</button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        // SUPABASE CONFIG (Injecting from shared.dart)
        const SB_URL = 'https://ntmbkkxmjekuppqxqxdl.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50bWJra3htamVrdXBwcXhxeGRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjEzNjIsImV4cCI6MjA4OTQ5NzM2Mn0.HtZDsdFRBN3wS4EKA7VAIjS79lB9Y1Vgg97R9e0-HKU';

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const form = document.getElementById('adminForm');
        const statusDiv = document.getElementById('status');
        const btnText = document.getElementById('btnText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const shopId = document.getElementById('shopId').value;

            btnText.innerText = "Provisioning...";
            statusDiv.style.display = "none";

            try {
                // 1. Sign up user
                const { data, error: signUpError } = await supabaseClient.auth.signUp({
                    email,
                    password
                });

                if (signUpError) throw signUpError;

                const userId = data.user.id;

                // 2. Create Profile row with Role and Shop ID
                const { error: profileError } = await supabaseClient
                    .from('profiles')
                    .upsert({
                        id: userId,
                        email: email,
                        role: 'shopkeeper',
                        shop_id: shopId
                    });

                if (profileError) throw profileError;

                showStatus("Success! Terminal assigned to " + email, "success");
                form.reset();

            } catch (err) {
                showStatus(err.message, "error");
            } finally {
                btnText.innerText = "Provision Terminal";
            }
        });

        function showStatus(msg, type) {
            statusDiv.innerText = msg;
            statusDiv.className = type;
            statusDiv.style.display = "block";
        }
    </script>
</body>
</html>
